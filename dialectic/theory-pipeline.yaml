# dyad-bond — Theory / Hypothesis Pipeline  (FORMAL STORE — read at resume)
#
# WHAT: the single store of experimental candidates + their confidence state. Formal/structured
#   so it is queryable and renderable; human-readable (yaml + prose notes) so the Operator can read
#   source directly any time — chat-pull is CONVENIENCE, not a gate (anti-meld: Agent ≠ sole interpreter).
# PRESENTATION: chat-based. The Agent pulls from this file and presents the relevant slice on demand;
#   NO maintained markdown dashboard (that is decoration). Most turns the Operator just asks for an answer.
# FULL DASHBOARD: deferred tool `report.py` (reads this file → file-format render) — BUILD AT FIRST
#   actual "show me the whole dashboard" request, not speculatively (wu-wei: minimum force).
# MODEL (independence-coverage): confidence ∝ coverage of independence-space by SURVIVING falsifiers.
#   A candidate is vulnerable in its UNCOVERED gaps; the largest typed gap = its next probe = the NBA.
#   Coverage is QUALITATIVE judgment, not measurement (our Method: observational, not lab).
#
# LEGEND
#   grade:      L0 born · L1 survived Covalent↔Operator (intra-dyad gate; no independent axis yet)
#               L2a inter-dyad same-human · L2b cross-human · TERMINAL (instrument-unreachable) · KILLED
#   axis status (weight/corpus/human independence of falsifiers that have attacked):
#               open (no independent falsifier) · partial · covered
#   gap.type:   layer-locality · meld-capture · signal-blindness  (s8 oracle-coverage failure modes)
#   exec_phase: INTAKE → DESIGN → PROBE → DISPOSE → (loop) | PARKED | GRADUATED | KILLED | TERMINAL
#   verdict:    survived | revised | refuted    (per FR: SURVIVED is provisional, only REFUTED decisive)
#
# Intake gate: D1 telos-filter (ours / sibling's / invariant) + falsifiability check before a row enters.

meta:
  owner: dyad-bond
  born: 2026-06-03            # session s9 (folded s7 claim-ledger from orchestration.md)
  basis_axes: [weight, corpus, human]   # corpus axis TRIANGULATED (bond-s8 ⟂ healer-N5), not unilateral
  # graduation is LADDER-TYPED (2026-06-24 raff) per the 2×2 in relationship-craft.md §The promotion ladders:
  #   2x2 = {claim: (a) value-root | (b) felt-interior} × {access: inside | outside}. Prose-home is there; this
  #   is the formal shadow. Replaces the prior single "L2b-for-everything" rule (which conflated the diagonal).
  graduation_rule:
    outside: ">= L2a survived AND a named next-rung experiment → kb-with-caveat (= survives + high coverage + the
              named standing falsifier). L2b (SOCIAL separator = cross-human 2nd-model audit; == external-ladder E1)
              RAISES coverage; it does NOT reach `settled` — no-oracle claims CAP at survives (external falsification
              is ongoing, never discharged). Outside column tops out at E3 = survives = kb-with-caveat. 'full-kb
              needs L2b' RETIRED (2026-06-24 raff: that re-imported a must-pass gate one level up — no-ratify)."
    settled: "NOT a coverage rung — reached by claim-type CLOSURE only: analytic (proof closes; decisive both ways)
              or posited/inherited (choice/conformance). No no-oracle claim reaches it. Single-home: invariant-schema.md."
    inside_interior: "felt-interior claims (IFF2 sub-kind b) ride the INTERNAL ladder I0→I2; terminal = I2
                      self-ratified-durable (the TEMPORAL separator = durability across the lag). NO L2b/cross-human
                      rung (a 2nd human's failure ≠ disproof of an N=1). Never kb-as-settled; live-quale residue
                      (F2-K1/K2) stays survives by construction."
    inside_value: "value-roots (IFF2 sub-kind a, posited within-operator) are decided-not-derived → terminal by
                   CHOICE, no promotion ladder. Their cross-operator GENERALIZATION is an OUTSIDE claim → outside rule."

