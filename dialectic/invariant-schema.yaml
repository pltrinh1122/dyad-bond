# dyad-invariant schema — NORMATIVE FOR STRUCTURE (machine-readable rung of the form-ladder)
# Rationale, provenance, rub-history, and PRACTICE guards live in invariant-schema.md (normative for
# rationale). On structural conflict: THIS FILE WINS. On meaning: the MD wins.
# Engine binding: build-time, not runtime (A-3 grammar_version pins; no yaml dependency in the engine).
schema: dyad-invariant
schema_version: "0.10.0"    # 0.10: +locus (G0/phenotype heritability axis, 2026-06-26) · 0.9: enforcement un-deferred — per-field A/B tag (s-web4, 2026-06-16)
fleet_idiom: yaml          # converges with fr.yaml / dag.yaml / theory-pipeline.yaml (D1)

condition_grammar:         # G1 fix (evaluator-build surfaced: undeclared = consistency hazard at meta-level)
  # required_iff / forbidden_iff strings MUST parse under EXACTLY this grammar (fail-closed otherwise):
  #   <field> == <value>   |   <field> != <value>   |   <field> in [<v1>, <v2>, ...]
  # <value> literals: true/false → bool; else bare string (no quotes, no nesting, no AND/OR — by design:
  # a condition needing conjunction is a schema smell → restructure the fields instead).
  reference_implementation: bin/invariant-eval.py#cond_eval

vocabularies:              # controlled — closed unless marked registry
  status:      [ratified, candidate, inherited, kb, retired]
  form:        [slogan, tuple, mathematical]
  settlement:  [candidate, survives, settled]   # `survives` (was `ratified-watch`, retired 2026-06-24 raff): no "ratify"/"-watch" on the no-oracle pole — see invariant-schema.md §Grounding boundary
  actor:       [agent, operator, both, any-dyad]
  modality:    [MUST, MUST-NOT, ONLY-BY, ONLY-AFTER]
  detector:    [hard-oracle, soft-record, other-half-only, unobservable-from-inside]
  edge_type:   [derived, serves, inherited]
  root_kind:   [fiat, forged, inherited]
  locus:       [g0, phenotype, unclassified]   # heritability axis (2026-06-26): G0-membership. g0 = universal dyad-gene (heritable; contributing it EXPANDS G0 — to the world the expanded floor is just G0) · phenotype = bond-specific, regenerated per dyad (not heritable) · unclassified = edge, pending Operator disposal. already-G0-vs-expansion-candidate timing is carried by `status` (inherited vs ratified/candidate). ("DNA" framing retired 2026-06-26 — redundant with G0.)
  enforcement: [hard-oracle, trust-boundary]  # per-field A/B (un-deferred s-web4) — gate vs declare
  re_rub_trigger: [context-shift, breach-evidence, census-conflict-flag, upstream-form-change]
  trigger:     # REGISTRY (open, append-only; the seam-taxonomy — the declared semantic-residue field)
    seed: [selection-seam, outward-publish, ratification, anchor-edit, stand-down, stand-up,
           uncertainty, candidate-admission, interior-finding]

record:                    # per-invariant constraints (engine VALIDATE stage — all mechanical)
  # enforcement (un-deferred s-web4, 2026-06-16): per-field A/B tag = what a GREEN run PROMISES.
  #   hard-oracle    = green ⇒ this field is CORRECT (validator gates it; Class A; FORM).
  #   trust-boundary = green ⇒ well-FORMED only; its TRUTH rests on a named discipline, DECLARED not
  #                    gated (Class B; the engine's B-1..B-4 / not_in_this_file residue).
  # Every field MUST carry one — the validator HALTS on an untagged field (the silent middle is unrepresentable).
  required: [id, home, one_liner, status, form, settlement, scope, prescription, observability]
  fields:
    id:          {enforcement: hard-oracle, type: string, pattern: "^[a-z0-9-]+:[A-Za-z0-9-]+$", unique: corpus}
    home:        {enforcement: hard-oracle, type: string}   # single-home ref; file gated, #anchor declared (engine tag-grammar)
    one_liner:   {enforcement: trust-boundary, type: string, max_chars: 300,  # display PROJECTION — tuple wins; fidelity = B-2
                  note: stored-at-ratification-never-regenerated}
    source_quote: {enforcement: hard-oracle, type: string, optional: true,  # the verbatim DYAD.md prose the one_liner derives from;
                   note: "audit_view.py gates verbatim-presence in DYAD.md (E1-fidelity instrument); whitespace-normalized"}
    status:      {enforcement: hard-oracle, enum: status}
    form:        {enforcement: hard-oracle, enum: form}
    settlement:  {enforcement: hard-oracle, enum: settlement}
    re_rub_triggers: {enforcement: hard-oracle, type: list, items: {enum: re_rub_trigger}, required_iff: "settlement != candidate"}
    root:        {enforcement: hard-oracle, type: bool, default: false}
    root_kind:   {enforcement: hard-oracle, enum: root_kind, required_iff: "root == true", forbidden_iff: "root == false"}
    locus:       {enforcement: trust-boundary, enum: locus, optional: true,   # G0/phenotype heritability; enum-gated (form), TRUTH (which-is-g0) = Operator disposal (B).
                  note: "g0=heritable-expands-G0 · phenotype=regenerated-per-dyad · unclassified=edge-pending-dispose"}
    adjudicated: {enforcement: trust-boundary, type: object, required_iff: "root == true",  # B-4 adjudication-truth: unverifiable-from-inside
                  fields: {by: {const: Operator}, date: {type: date}, currency_note: {type: string}}}
    grounded_in: {enforcement: trust-boundary, type: list, required_iff: "root == false", forbidden_iff: "root == true",  # graph GATED (orphan/cycle/term); edge-PLAUSIBILITY = B
                  items: {fields: {ref: {type: id-ref}, edge: {enum: edge_type},
                                   scar: {type: string, optional: true}}}}  # scar pairs w/ serves-edges
    scope:
      enforcement: trust-boundary                           # actor/trigger enums gated; trigger-EQUIVALENCE = B (residue concentrates here)
      fields:
        actor:      {enum: actor, required: true}
        trigger:    {enum: trigger, required: true,
                     lint: must-not-contain-action-token}   # normalization rule (heuristic lint)
        condition:  {type: string, optional: true}          # narrowing only
        exclusions: {type: list, optional: true}            # a RESCOPE lands here as a field-edit
    prescription:
      enforcement: trust-boundary                           # modality enum + census gated; deontic CONTENT = B (FORM-not-TRUTH)
      fields:
        action:   {type: string, required: true}            # act-class
        object:   {type: string, optional: true}
        modality: {enum: modality, required: true}
        via:      {type: string, required_iff: "modality in [ONLY-BY, ONLY-AFTER]",
                   forbidden_iff: "modality in [MUST, MUST-NOT]"}
    observability:
      enforcement: trust-boundary                           # detector/observable enums gated; ADEQUACY (does it catch the breach?) = B
      fields:
        observable:     {type: string, required: true}      # evidence-class
        detector:       {enum: detector, required: true}
        breach_example: {type: string, optional: true}      # the lived scar ref
    math:                                                   # required iff form == mathematical
      enforcement: trust-boundary                           # expression OPAQUE — structurally present, semantically unevaluated
      required_iff: "form == mathematical"
      fields:
        expression:       {type: string}                    # e.g. "1*x + 1*y > 2"
        measurements:     {type: list,                      # the math-form's Class-B — DECLARED
                           items: {fields: {var: {type: string}, operationalized_by: {type: string}}}}
        use:              {const: breach-detector}          # Goodhart guard — never objective-function

corpus:                    # corpus-level constraints (census/FSM — all mechanical)
  - id-uniqueness: global
  - grounding-graph: {acyclic: true, edges-resolve: true,
                      every-chain-terminates-at: "root == true"}
  - orphan: "root == false AND grounded_in unresolvable"    # -> flag: boundary-candidate OR ungrounded
  - census:
      strict_conflict: "scope-overlap AND same action AND clashing modality"
      pincer_candidate: "trigger with >=2 prohibitions and 0 affirmative paths (deontic only)"
      duty_detector_mismatch: "actor==agent AND detector in [other-half-only, unobservable-from-inside]
                               AND modality==MUST"
  - staleness: "view sha-pins != source shas -> armed"

not_in_this_file:          # declared residue — PRACTICE invariants, MD-normative, NOT mechanical
  - trigger-equivalence judgment (G + Operator; engine-stamped)
  - edge-plausibility / semantic provenance (G rubs, Operator disposes)
  - descent-guard (operationalization must survive its own rub before form descends)
  - one_liner semantic fidelity (heuristic lint only)
  - valence-pincers (no scored-registry model; G-side)
