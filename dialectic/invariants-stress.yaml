#   S2     PROHIBITION with a HARD oracle + act-attempt trigger (lint+vocab double-fire) EXPECTED
#   U1     kb-settled · CARDINALITY ("<=1 per turn") — quantifier inexpressible · turn-seam absent
#   TENET  mathematical form (fresh expression) + descent-guard meta-question
#   D12    COMPOSITE invariant (stand-up diff AND stand-down flag) — one-trigger-per-record limit
#   S1     PERMISSION (standing-authorization) — deontic vocab is obligation-only, no MAY EXPECTED
