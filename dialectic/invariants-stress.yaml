# hold it, the FAILURE is the finding (do NOT shoehorn to force a PASS, and do NOT "fix" the schema
# here — the gap feeds the Operator's pending gate-list dispositions G2 + tag-architecture).
# Findings summary lives beside the eval output in the commit message + the chat report; the mechanical
# truth is whatever `bin/invariant-eval.py dialectic/invariant-schema.yaml dialectic/invariants-stress.yaml`
# prints — read THAT, not this header.
#
# Coverage design (which schema region each record stresses):
#   C1     control PASS · forged root · ONLY-BY
#   C4     inherited root · ONLY-AFTER + via
#   D2     PROHIBITION (MUST-NOT) on act-CONDUCT → the real G2 probe (registry has no conduct seam)
