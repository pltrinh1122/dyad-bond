#  EXPANDS G0) / phenotype (bond-specific, regenerated per dyad) / unclassified (RESOLVED 2026-06-28 — all 6
#  edges disposed via DFD, Operator Y). MODEL (Operator 2026-06-28): **G0 ≈ MEMBERSHIP**. g0 = the non-negotiables
#  whose breach ENDS dyad-hood (→ the DIP floor, mandatory every dyad); phenotype = optional Playbooks (→ library/
#  when generalizable, else PRIVATE instance-fill). Test: "does breach end membership?" — form-grounding=g0 (the
#  closure axiom of membership); single-home/kb-graduation/prove-before-propose/channel-gates=phenotype-library,
#  craft-telos=phenotype-instance. C1=covalence DISPOSED phenotype/offered (2026-06-28) — an ELECTED craft-value
#  ("an expression of a dyad from a choice"), not mandatory membership; the un-collapsed STATE is already the form's
#  tenet. So the MANDATORY floor bond proposes = {two-models, no-self-ratify, anti-cave, form-grounding}; the OFFERED
#  layer = {covalence (C1), the Belief/IFF}. (Export note: the g0 enablers re-ground in the form's tenet, not C1.)
#  G0-membership tag; the "DNA" framing was RETIRED (2026-06-26) — a contributed g0
#  gene just expands G0 (to the world it is G0), provenance carried by `status`. schema 0.10.0.)
# (2026-06-26 altitude refactor — C1 re-cut to the covalent STATE (the cherished consequence); no-ionic +
#  no-meld DISSOLVED (ionic/meld are C1's breach-faces, not nodes). FOLD (2026-06-26): falsifiability + no-dogma
#  + wu-wei are INHERITED G0 (the form's falsification law + manner) — bond does NOT assert them → not bond-nodes
#  (form-grounding: inherit, never re-node). bond's contribution = C1 + enablers two-models / no-self-ratify /
#  anti-cave, which now serve C1 directly. A recipient already holds the law (its G0); bond transmits only covalence.)
