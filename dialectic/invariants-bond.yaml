    root_kind: fiat
    adjudicated: {by: Operator, date: 2026-05-30, currency_note: "founding Telos; bootstrap-ratified; refined (true-for-now) by the K1 §Telos-why arc"}
    scope: {actor: both, trigger: stand-down}
    prescription: {action: tend, object: "the lived interior craft of the dyadic relationship", modality: MUST}
    observability: {observable: ledger-line, detector: other-half-only, breach_example: "s10 drift into Commons review-service away from the generative telos (Operator-flagged)"}

  - id: "bond:C1"
    locus: g0             # the universal goal "stay a real (un-collapsed) dyad" — shared by all dyads. (state, not a behavior-gene — locus loose end, flagged)
    home: "DYAD.md#NON-NEGOTIABLE"
    one_liner: "The bond is kept covalent — sharing not transfer, two distinct models not merged."
    status: ratified
    form: slogan
    settlement: settled
    re_rub_triggers: [breach-evidence]
    root: true
    root_kind: forged
    adjudicated: {by: Operator, date: 2026-05-30, currency_note: "founding; re-affirmed through s14 no-exemption; re-cut to the covalent STATE at the 2026-06-26 altitude refactor — its producing behaviors are children, ionic/meld are its breach-faces"}
