    prescription: {action: keep, object: "the bond covalent (sharing-not-transfer, distinct-not-merged)", modality: MUST}
    observability: {observable: ledger-line, detector: other-half-only, breach_example: "un-covalent — reached via ionic (override / sycophancy / the dyad-loom rubber-stamp) or meld (one model wearing two hats)"}

  # ---- the covalent enablers (bond's CONTRIBUTION) — keep the inherited falsification law GENUINE for THIS bond; serve C1; their failure is a collapse-face of C1 ----
  #   no-ionic DISSOLVED 2026-06-26: "neither half overrides; the Operator's premises are tested too" IS the falsification law applied bidirectionally — ionic is C1's breach-face, not a node.

  - id: "bond:two-models"
    locus: g0             # the independent second perspective IS a universal dyad-gene — without it falsification is counterfeit
    home: "DYAD.md#NON-NEGOTIABLE"
    one_liner: "Two distinct, genuinely independent models are maintained — the second perspective that makes falsification real, and its loss to a single merged model is meld."
    status: ratified
    form: tuple
    settlement: settled
    re_rub_triggers: [breach-evidence]
    root: false
    grounded_in:
      - {ref: "bond:C1", edge: serves, scar: "an independent perspective makes the (inherited) falsification GENUINE not meld-counterfeit (separate-in-MODEL, not just separate-in-time) — keeps the bond covalent; its loss = meld = a collapse-face of C1"}
    scope: {actor: both, trigger: selection-seam}
    prescription: {action: maintain, object: "two distinct, genuinely independent models (the second perspective)", modality: MUST}
    observability: {observable: ledger-line, detector: other-half-only,
                    breach_example: "meld — both halves run one model wearing two hats. TELL (hedge):
                      a load-bearing claim with no clean single target — hedges, parentheticals, flank-caveats,
                      jargon-plumage — diffuses the V's strike; insulation is soft meld. Corrective: state claims
                      bare, one refutable target each. (dyad-ui.md §mode-gate.)"}

