# Audit (fidelity, side-by-side):           python3 bin/audit_view.py dialectic/invariants-bond.yaml DYAD.md --emit views/invariants-bond.audit.md
# (rendered.md RETIRED 2026-06-27 — worksheet model: md prose is the human form, audit-view is the check.)

