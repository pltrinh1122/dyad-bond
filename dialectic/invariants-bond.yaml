                      jargon-plumage — diffuses the V's strike; insulation is soft meld. Corrective: state claims
                      bare, one refutable target each. (DYAD.md NON-NEGOTIABLE §hedge-tell; dyad-ui.md §mode-gate.)"}

  # ---- C1 active duty (the bidirectional-ionic guard; serves no-ionic, cannot catch meld) ----

  - id: "bond:anti-cave"
    home: "dialectic/relationship-craft.md#the-anti-cave-duty"
