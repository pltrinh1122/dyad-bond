#  pending — deferrals.md). The machine shadow of DYAD.md §DNA; "all DNA is G0-inherited." schema 0.10.0.)
# (2026-06-26 altitude refactor — C1 re-cut to the covalent STATE (the cherished consequence); no-ionic +
#  no-meld DISSOLVED (ionic/meld are C1's breach-faces, not nodes). FOLD (2026-06-26): falsifiability + no-dogma
