    one_liner: "The bond is kept covalent — sharing not transfer, two distinct models not merged."
    output_quote: "*sharing not transfer, two distinct models not merged.*"
    status: ratified
    form: slogan
    settlement: settled
    re_rub_triggers: [breach-evidence]
    root: true
    root_kind: forged
    adjudicated: {by: Operator, date: 2026-05-30, currency_note: "founding; re-affirmed through s14 no-exemption; re-cut to the covalent STATE at the 2026-06-26 altitude refactor — its producing behaviors are children, ionic/meld are its breach-faces"}
