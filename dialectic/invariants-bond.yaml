  - id: "bond:identity-conformance"
    home: "DYAD.md#IDENTITY-CAVEAT"
    one_liner: "The running anchor's identity must conform to the frozen birth-id sha (recomputed from CLAUDE.md@1ab6ad0, never trust-stored) — drift from the canonical sha is the breach."
