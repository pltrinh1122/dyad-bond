    prescription: {action: conform, object: "running identity to the frozen birth-id sha", modality: MUST}
    observability: {observable: sha-comparison, detector: hard-oracle}

  - id: "bond:glossary-conformance"
    home: "DYAD.md#Vocabulary"
    one_liner: "Every term used in an invariant node must be defined in GLOSSARY.md — an undefined (orphan) term is the mechanical breach (soft semantic fidelity stays ordinary covalent review, not this node)."
