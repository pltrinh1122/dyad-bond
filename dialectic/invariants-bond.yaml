    form: tuple
    settlement: candidate
    root: false
    grounded_in:
      - {ref: "bond:Telos", edge: serves, scar: "the invariants are written IN this vocabulary — uninterpretable without it"}
    scope: {actor: both, trigger: anchor-edit}
    prescription: {action: define, object: "every term used in an invariant node, in GLOSSARY.md", modality: MUST}
    observability: {observable: term-membership-check, detector: hard-oracle}
